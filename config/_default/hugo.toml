baseURL = "https://blog.yuzuru.me/"

# Theme is imported as a Hugo Module — see config/_default/module.toml.
# Do NOT set `theme = "blowfish"` here; it conflicts with the module import.

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true

enableRobotsTXT = true
enableEmoji = true
enableGitInfo = true
summaryLength = 30
buildDrafts = false
buildFuture = false

[taxonomies]
tag = "tags"

[pagination]
pagerSize = 20

[outputs]
home = ["HTML", "RSS", "JSON"]

[related]
threshold = 20

[[related.indices]]
name = "tags"
weight = 100

[[related.indices]]
name = "date"
weight = 10
