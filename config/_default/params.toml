colorScheme          = "blowfish"
defaultAppearance    = "dark"
autoSwitchAppearance = true
enableSearch         = true
enableCodeCopy       = true

[header]
  layout = "fixed"

[footer]
  showMenu               = true
  showCopyright          = true
  showThemeAttribution   = false
  showAppearanceSwitcher = true
  showScrollToTop        = true

[homepage]
  layout          = "profile"
  showRecent      = true
  showRecentItems = 5
  cardView        = true

[article]
  showDate            = true
  showDateUpdated     = true
  showAuthor          = true
  showReadingTime     = true
  showWordCount       = true
  showTableOfContents = true
  showTaxonomies      = true
  showRelatedContent  = true
  relatedContentLimit = 3
  showEdit            = true
  editURL             = "https://github.com/Nagato-Yuzuru/my-locus/blob/main/"
  editAppendPath      = true
  sharingLinks        = ["x-twitter", "bluesky", "reddit", "email"]

[list]
  showSummary = true
  cardView    = true
  groupByYear = true

[taxonomy]
  showTermCount = true
